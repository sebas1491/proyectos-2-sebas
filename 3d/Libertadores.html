<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Libertadores de América 3D - Relieve Reforzado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap');
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%); 
            font-family: 'Montserrat', sans-serif; 
        }
        canvas { display: block; }
        .ui-overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            pointer-events: none;
            z-index: 10;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-left: 4px solid #94a3b8;
            padding: 1rem 1.8rem;
            border-radius: 4px;
        }
        .silver-text {
            color: #f1f5f9;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-shadow: 0 0 20px rgba(148, 163, 184, 0.5);
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="glass-panel">
            <h1 class="silver-text">LIBERTADORES</h1>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, trophy;

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 32);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4; 
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.8;

            setupLighting();
            createLibertadores();

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function setupLighting() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            
            const light1 = new THREE.DirectionalLight(0xffffff, 2.0);
            light1.position.set(10, 20, 10);
            scene.add(light1);
            
            const light2 = new THREE.DirectionalLight(0xffffff, 1.5);
            light2.position.set(-10, 10, 10);
            scene.add(light2);

            const rimLight = new THREE.SpotLight(0xffffff, 3);
            rimLight.position.set(0, 20, -15);
            scene.add(rimLight);
        }

        function createLibertadores() {
            trophy = new THREE.Group();

            const silverMat = new THREE.MeshStandardMaterial({
                color: 0xd1d1d1,
                metalness: 1.0,
                roughness: 0.2,
                emissive: 0x111111,
            });

            const shadowMat = new THREE.MeshBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: 0.7
            });

            const woodMat = new THREE.MeshStandardMaterial({
                color: 0x080402, 
                roughness: 0.5,
                metalness: 0.0,
            });

            // --- PEDESTAL ---
            const pedestalGroup = new THREE.Group();
            const mainPedestal = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 3.2, 9, 64), woodMat);
            mainPedestal.position.y = -3.5;
            pedestalGroup.add(mainPedestal);

            const bottomStep = new THREE.Mesh(new THREE.CylinderGeometry(3.3, 3.4, 0.6, 64), woodMat);
            bottomStep.position.y = -7.7;
            pedestalGroup.add(bottomStep);

            const rows = 6;
            const platesPerRow = 12;
            const plateGeo = new THREE.BoxGeometry(0.8, 0.5, 0.05); 

            for (let j = 0; j < rows; j++) {
                for (let i = 0; i < platesPerRow; i++) {
                    const angle = (i / platesPerRow) * Math.PI * 2;
                    const h = 0.2 - (j * 1.2); 
                    const plate = new THREE.Mesh(plateGeo, silverMat);
                    const radius = 2.5 + (j * 0.12); 
                    plate.position.set(Math.cos(angle) * radius, h, Math.sin(angle) * radius);
                    plate.lookAt(0, h, 0);
                    pedestalGroup.add(plate);
                }
            }

            const topCap = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.4, 0.4, 64), silverMat);
            topCap.position.y = 1.0;
            pedestalGroup.add(topCap);
            trophy.add(pedestalGroup);

            // --- CUERPO ---
            const silverBody = new THREE.Group();
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 3.5, 32), silverMat);
            neck.position.y = 2.8;
            silverBody.add(neck);

            const neckBase = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 2.5, 0.8, 32), silverMat);
            neckBase.position.y = 1.4;
            silverBody.add(neckBase);

            const globeRadius = 2.7;
            const mainGlobe = new THREE.Mesh(new THREE.SphereGeometry(globeRadius, 64, 64), silverMat);
            mainGlobe.position.y = 7.0;
            silverBody.add(mainGlobe);

            const equator = new THREE.Mesh(new THREE.TorusGeometry(globeRadius + 0.02, 0.06, 16, 100), silverMat);
            equator.rotation.x = Math.PI / 2;
            equator.position.y = 7.0;
            silverBody.add(equator);

            // --- TEXTO "LIBERTADORES" - MÁS GRUESO Y CON SOMBRA ---
            const fontLoader = new THREE.FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const text = "LIBERTADORES";
                const radius = globeRadius + 0.04;
                const arcLength = 2.0;
                
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const charGeo = new THREE.TextGeometry(char, {
                        font: font,
                        size: 0.55,
                        height: 0.3, // Grosor aumentado (de 0.2 a 0.3)
                        curveSegments: 12,
                    });
                    charGeo.center();
                    
                    const angle = ((i / (text.length - 1)) - 0.5) * arcLength;
                    
                    // Letra Plateada (Relieve más grueso)
                    const charMesh = new THREE.Mesh(charGeo, silverMat);
                    charMesh.position.x = Math.sin(angle) * radius;
                    charMesh.position.z = Math.cos(angle) * radius;
                    charMesh.position.y = 7.0;
                    charMesh.rotation.y = angle;
                    silverBody.add(charMesh);

                    // Letra Sombra
                    const shadowMesh = new THREE.Mesh(charGeo, shadowMat);
                    const shadowRadius = radius - 0.02; 
                    shadowMesh.position.x = Math.sin(angle) * shadowRadius;
                    shadowMesh.position.z = Math.cos(angle) * shadowRadius;
                    shadowMesh.position.y = 6.96; 
                    shadowMesh.rotation.y = angle;
                    shadowMesh.scale.set(1.08, 1.08, 1);
                    silverBody.add(shadowMesh);
                }
            });

            // Soportes laterales (Aún más adentro del mundo)
            for (let i = 0; i < 2; i++) {
                const side = i === 0 ? 1 : -1;
                // Posición X reducida de 3.0 a 2.5 para que entren más profundo
                const stickX = 2.5 * side; 
                const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.35, 1.8, 32), silverMat);
                stick.rotation.z = (Math.PI / 2) * side;
                stick.position.set(stickX, 7.0, 0); 
                silverBody.add(stick);

                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.2, 32), silverMat);
                // Ajuste de la posición de la moneda para que siga el movimiento del soporte
                coin.position.set((stickX + 1.1 * side), 7.0, 0); 
                coin.rotation.z = Math.PI / 2;
                silverBody.add(coin);
            }
            trophy.add(silverBody);

            // --- JUGADOR ---
            const playerGroup = new THREE.Group();
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), silverMat);
            ball.position.y = 9.85;
            playerGroup.add(ball);

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.7, 12), silverMat);
            torso.position.y = 10.5;
            playerGroup.add(torso);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), silverMat);
            head.position.y = 11.0;
            playerGroup.add(head);

            const armGeo = new THREE.CylinderGeometry(0.05, 0.03, 0.5, 8);
            const armL = new THREE.Mesh(armGeo, silverMat);
            armL.position.set(-0.25, 10.7, 0);
            armL.rotation.z = Math.PI / 3;
            playerGroup.add(armL);

            const armR = new THREE.Mesh(armGeo, silverMat);
            armR.position.set(0.25, 10.7, 0);
            armR.rotation.z = -Math.PI / 3;
            playerGroup.add(armR);

            const legGeo = new THREE.CylinderGeometry(0.07, 0.04, 0.6, 8);
            const legL = new THREE.Mesh(legGeo, silverMat);
            legL.position.set(-0.1, 10.05, 0);
            legL.rotation.z = 0.1;
            playerGroup.add(legL);

            const legR = new THREE.Mesh(legGeo, silverMat);
            legR.position.set(0.1, 10.05, 0);
            legR.rotation.z = -0.1;
            playerGroup.add(legR);

            trophy.add(playerGroup);
            trophy.position.y = -1;
            scene.add(trophy);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (trophy) {
                trophy.rotation.y += 0.005;
                trophy.position.y = -1 + Math.sin(Date.now() * 0.001) * 0.1;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
