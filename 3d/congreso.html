<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palacio del Congreso de la Nación Argentina - Versión Final</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #a3d8f4;
            font-family: 'Inter', sans-serif;
        }
        #ui-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 12px;
            pointer-events: none;
            max-width: 320px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 10;
        }
        h1 { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 800; }
        .badge {
            background: #2d5a27;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: inline-block;
        }
        p { margin: 0; font-size: 0.9rem; line-height: 1.5; color: #444; }
        .controls-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0,0,0,0.6);
            font-size: 0.8rem;
            background: rgba(255,255,255,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            z-index: 10;
        }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="badge">Arquitectura Monumental</div>
        <h1>Palacio del Congreso</h1>
        <p>Corrección estructural: Columnas del tambor ahora sostienen un entablamento real y nacen de una base sólida integrada. Se mantienen todos los detalles de fachadas.</p>
    </div>

    <div class="controls-hint">Orbitar: Clic Izquierdo • Zoom: Rueda • Desplazar: Clic Derecho</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, congressGroup;
        let isMouseDown = false;
        let targetRotationY = 0.5, targetRotationX = 0.3;
        let rotationY = 0.5, rotationX = 0.3;
        let zoom = 150;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d8f4);
            scene.fog = new THREE.Fog(0xa3d8f4, 300, 1200);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 50, zoom);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Luces
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sun.position.set(150, 200, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 4096;
            sun.shadow.mapSize.height = 4096;
            scene.add(sun);

            congressGroup = new THREE.Group();

            // Materiales
            const marbleMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.5 });
            const darkMarbleMat = new THREE.MeshStandardMaterial({ color: 0x8a8a8a, roughness: 0.7 });
            const domeMat = new THREE.MeshStandardMaterial({ color: 0x3d664d, roughness: 0.6, metalness: 0.3 }); 
            const graniteMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.9 });
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });

            const createBox = (w, h, d, x, y, z, mat) => {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mesh = new THREE.Mesh(geo, mat || marbleMat);
                mesh.position.set(x, y + h/2, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                congressGroup.add(mesh);
                return mesh;
            };

            // 1. BASE Y CUERPO PRINCIPAL
            createBox(160, 3, 40, 0, 0, 0, graniteMat); // Zócalo base
            createBox(64, 18, 30, 0, 3, 0, darkMarbleMat); 
            createBox(35, 15, 25, 45, 3, -2.5, marbleMat); 
            createBox(35, 15, 25, -45, 3, -2.5, marbleMat); 

            // 2. PABELLONES LATERALES (ANCHOS)
            const sideWidth = 22;
            const sideDepth = 40;
            for(let side = -1; side <= 1; side += 2) {
                const x = 75 * side;
                createBox(sideWidth, 21, sideDepth, x, 3, 2, marbleMat);
                createBox(sideWidth + 2, 1, sideDepth + 2, x, 24, 2, darkMarbleMat); 
                
                // Ventanas
                for(let r = 0; r < 3; r++) {
                    createBox(4, 4, 1, x, 6 + r*6, 2 + sideDepth/2, windowMat);
                }
            }

            // Cornisas
            createBox(155, 0.6, 31, 0, 10, -0.5, darkMarbleMat);
            createBox(155, 0.8, 31, 0, 18, -0.5, marbleMat);

            // 3. DETALLES VENTANAS CENTRALES
            for(let side = -1; side <= 1; side += 2) {
                for(let row = 0; row < 2; row++) {
                    for(let i = 0; i < 6; i++) {
                        const xPos = side * (32 + i * 5);
                        const yPos = 6 + row * 6;
                        createBox(1.8, 3.5, 0.5, xPos, yPos, 10, windowMat);
                        createBox(2.2, 0.3, 1, xPos, yPos + 3.5, 10.2, marbleMat); 
                    }
                }
            }

            // 4. ESCALINATA Y PÓRTICO
            for(let i = 0; i < 15; i++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(24 - i*0.15, 0.3, 12 - i*0.6), graniteMat);
                step.position.set(0, 3 + 0.3 * i, 15 + (12 - i*0.6)/2);
                step.receiveShadow = true;
                congressGroup.add(step);
            }

            createBox(22, 1, 10, 0, 7.5, 18, marbleMat);
            for(let i = -3; i <= 3; i++) {
                const colX = i * 2.6;
                const col = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 13, 12), marbleMat);
                col.position.set(colX, 7.5 + 6.5, 22);
                col.castShadow = true;
                congressGroup.add(col);
            }

            // Frontis
            const triangleShape = new THREE.Shape();
            triangleShape.moveTo(-11.5, 0); triangleShape.lineTo(11.5, 0); triangleShape.lineTo(0, 5); triangleShape.lineTo(-11.5, 0);
            const frontis = new THREE.Mesh(new THREE.ExtrudeGeometry(triangleShape, { depth: 2, bevelEnabled: true }), marbleMat);
            frontis.position.set(0, 21, 23);
            congressGroup.add(frontis);

            // 5. CUADRIGA
            createBox(9, 1, 4, 0, 23, 20, domeMat);
            const victoria = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.5, 5, 8), domeMat);
            victoria.position.set(0, 26, 19.5);
            congressGroup.add(victoria);

            // 6. --- RECONSTRUCCIÓN INTEGRAL DE LA CÚPULA Y COLUMNAS ---
            
            // A. Base cuadrada masiva (el pedestal donde se apoyan las columnas)
            const domeBaseY = 21;
            createBox(26, 14, 26, 0, domeBaseY, 0, darkMarbleMat); 

            // B. Tambor Cilíndrico Central (el núcleo)
            const drumY = domeBaseY + 14;
            const drumHeight = 18;
            const drumCore = new THREE.Mesh(new THREE.CylinderGeometry(8, 8.5, drumHeight, 32), marbleMat);
            drumCore.position.y = drumY + drumHeight/2;
            congressGroup.add(drumCore);

            // C. COLUMNAS DEL TAMBOR (Ubicadas en el perímetro de la base cuadrada)
            const colCount = 20;
            const colRadius = 10.5;
            for(let i = 0; i < colCount; i++) {
                const angle = (i / colCount) * Math.PI * 2;
                const posX = Math.cos(angle) * colRadius;
                const posZ = Math.sin(angle) * colRadius;
                
                // Columna que nace de la base cuadrada
                const dCol = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, drumHeight, 10), marbleMat);
                dCol.position.set(posX, drumY + drumHeight/2, posZ);
                dCol.castShadow = true;
                congressGroup.add(dCol);
            }

            // D. ENTABLAMENTO (La cornisa circular que une las columnas y soporta la cúpula)
            const entablature = new THREE.Mesh(new THREE.CylinderGeometry(11.5, 11.5, 3, 32), marbleMat);
            entablature.position.y = drumY + drumHeight + 1.5;
            entablature.castShadow = true;
            congressGroup.add(entablature);

            // E. LA CÚPULA (Estirada)
            const domeStart = drumY + drumHeight + 3;
            const domeRadius = 9;
            const domeScaleY = 1.45;
            
            const domeMesh = new THREE.Mesh(new THREE.SphereGeometry(domeRadius, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2), domeMat);
            domeMesh.position.y = domeStart;
            domeMesh.scale.y = domeScaleY;
            congressGroup.add(domeMesh);

            // Nervaduras
            const nervesCount = 16;
            for(let i = 0; i < nervesCount; i++) {
                const angle = (i / nervesCount) * Math.PI * 2;
                const nerveGroup = new THREE.Group();
                nerveGroup.position.y = domeStart;
                nerveGroup.rotation.y = angle;
                const segmentCount = 10;
                for(let j = 0; j < segmentCount; j++) {
                    const latAngle = (j / segmentCount) * (Math.PI / 2);
                    const seg = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 1.2), domeMat);
                    seg.position.z = Math.cos(latAngle) * (domeRadius + 0.1);
                    seg.position.y = Math.sin(latAngle) * (domeRadius * domeScaleY + 0.1);
                    seg.rotation.x = -latAngle;
                    nerveGroup.add(seg);
                }
                congressGroup.add(nerveGroup);
            }

            // F. Linterna final
            const lanternY = domeStart + (domeRadius * domeScaleY);
            createBox(3.5, 12, 3.5, 0, lanternY, 0, domeMat);
            const spire = new THREE.Mesh(new THREE.ConeGeometry(0.6, 12, 12), domeMat);
            spire.position.y = lanternY + 16;
            congressGroup.add(spire);

            scene.add(congressGroup);

            // Suelo
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            rotationY += (targetRotationY - rotationY) * 0.08;
            rotationX += (targetRotationX - rotationX) * 0.08;
            camera.position.x = Math.sin(rotationY) * zoom;
            camera.position.z = Math.cos(rotationY) * zoom;
            camera.position.y = Math.sin(rotationX) * zoom + 30;
            camera.lookAt(0, 30, 0);
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.addEventListener('resize', onWindowResize);
        document.addEventListener('mousedown', (e) => { if(e.button === 0) isMouseDown = true; });
        document.addEventListener('mouseup', () => isMouseDown = false);
        document.addEventListener('mousemove', (e) => {
            if(isMouseDown) {
                targetRotationY -= e.movementX * 0.005;
                targetRotationX = Math.max(0.1, Math.min(targetRotationX - e.movementY * 0.005, 1.4));
            }
        });
        document.addEventListener('wheel', (e) => {
            zoom = Math.max(80, Math.min(zoom + e.deltaY * 0.2, 800));
        });
    </script>
</body>
</html>
