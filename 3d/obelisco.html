<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obelisco de Buenos Aires - Iluminación Realista</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87ceeb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #1a1a1a;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            pointer-events: none;
            max-width: 320px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }
        h1 { margin: 0 0 8px 0; font-size: 1.8rem; font-weight: 800; color: #000; }
        .badge {
            background: #0081c9;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: inline-block;
        }
        p { margin: 0; font-size: 0.95rem; opacity: 0.8; line-height: 1.6; color: #333; }
        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0,0,0,0.6);
            font-size: 0.85rem;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
        }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="badge">Detalles Finales</div>
        <h1>Luz y Sombra</h1>
        <p>Se han añadido las ventanas en la parte superior. Al orbitar, notarás cómo las ventanas en la cara sombreada permanecen oscuras mientras las del frente reciben la claridad del día.</p>
    </div>

    <div class="controls-hint">Orbita con el ratón • Observa las ventanas superiores</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, obeliskGroup;
        let isMouseDown = false;
        let angleY = 0, angleX = 0.3;
        let targetAngleY = 0, targetAngleX = 0.3;
        let zoom = 60;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d8f4); 
            scene.fog = new THREE.Fog(0xa3d8f4, 50, 400);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            sunLight.position.set(60, 100, 40); 
            sunLight.castShadow = true;
            
            sunLight.shadow.mapSize.width = 2048; 
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.left = -50;
            sunLight.shadow.camera.right = 50;
            sunLight.shadow.camera.top = 50;
            sunLight.shadow.camera.bottom = -50;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 500;
            sunLight.shadow.bias = -0.0005; 
            
            scene.add(sunLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            scene.add(hemiLight);

            obeliskGroup = new THREE.Group();

            const stoneMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xffffff,
                roughness: 0.8,
                metalness: 0.0
            });

            // Base
            const baseBottomGeo = new THREE.BoxGeometry(9.5, 1.2, 9.5);
            const baseBottom = new THREE.Mesh(baseBottomGeo, stoneMaterial);
            baseBottom.position.y = 0.6;
            baseBottom.receiveShadow = true;
            baseBottom.castShadow = true;
            obeliskGroup.add(baseBottom);

            const baseTopGeo = new THREE.BoxGeometry(7.8, 2.5, 7.8);
            const baseTop = new THREE.Mesh(baseTopGeo, stoneMaterial);
            baseTop.position.y = 2.45;
            baseTop.castShadow = true;
            baseTop.receiveShadow = true;
            obeliskGroup.add(baseTop);

            // Puerta
            const doorGeo = new THREE.PlaneGeometry(1.2, 2.2);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 2.3, 3.91);
            obeliskGroup.add(door);

            // Cuerpo
            const bodyHeight = 31;
            const bodyGeo = new THREE.CylinderGeometry(1.6, 3.2, bodyHeight, 4, 1, false);
            const body = new THREE.Mesh(bodyGeo, stoneMaterial);
            body.position.y = 3.7 + (bodyHeight/2);
            body.rotation.y = Math.PI / 4;
            body.castShadow = true;
            body.receiveShadow = true;
            obeliskGroup.add(body);

            // Punta
            const topHeight = 3.5;
            const topGeo = new THREE.ConeGeometry(1.61, topHeight, 4);
            const top = new THREE.Mesh(topGeo, stoneMaterial);
            top.position.y = 3.7 + bodyHeight + (topHeight/2);
            top.rotation.y = Math.PI / 4;
            top.castShadow = true;
            top.receiveShadow = true;
            obeliskGroup.add(top);

            // Ventanitas (Añadidas de nuevo)
            const winGeo = new THREE.PlaneGeometry(0.35, 0.5);
            const winMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });
            
            // Colocamos una ventana en cada cara (4 ventanas)
            const angles = [0, Math.PI/2, Math.PI, Math.PI * 1.5];
            const dist = 0.88; // Ligeramente por fuera del cuerpo
            const height = 35.5;

            angles.forEach((angle) => {
                const win = new THREE.Mesh(winGeo, winMat);
                win.position.set(
                    Math.cos(angle) * dist, 
                    height, 
                    Math.sin(angle) * dist
                );
                win.rotation.y = -angle + Math.PI/2;
                obeliskGroup.add(win);
            });

            scene.add(obeliskGroup);

            // Entorno Fijo
            const asphaltGeo = new THREE.PlaneGeometry(2000, 2000);
            const asphaltMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
            const asphalt = new THREE.Mesh(asphaltGeo, asphaltMat);
            asphalt.rotation.x = -Math.PI / 2;
            asphalt.receiveShadow = true; 
            scene.add(asphalt);

            const grassGeo = new THREE.CircleGeometry(45, 64);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x3d7a3d, roughness: 1 });
            const grass = new THREE.Mesh(grassGeo, grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = 0.02;
            grass.receiveShadow = true;
            scene.add(grass);

            // Interacciones de la Cámara
            document.addEventListener('mousedown', (e) => { if(e.button === 0) isMouseDown = true; });
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', (e) => {
                if(isMouseDown) {
                    targetAngleY -= e.movementX * 0.005;
                    targetAngleX = Math.max(0.05, Math.min(targetAngleX + e.movementY * 0.005, 1.4));
                }
            });
            document.addEventListener('wheel', (e) => {
                zoom = Math.max(20, Math.min(zoom + e.deltaY * 0.05, 200));
            });
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            angleY += (targetAngleY - angleY) * 0.1;
            angleX += (targetAngleX - angleX) * 0.1;

            camera.position.x = Math.sin(angleY) * Math.cos(angleX) * zoom;
            camera.position.z = Math.cos(angleY) * Math.cos(angleX) * zoom;
            camera.position.y = Math.sin(angleX) * zoom + 10;
            
            camera.lookAt(0, 15, 0);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
