<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bombonera - Estructura Unificada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            background: linear-gradient(135deg, #003399 0%, #001a3d 100%);
            padding: 15px 25px;
            border-radius: 4px;
            border-bottom: 4px solid #ffc72c;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .label { font-weight: bold; color: #ffc72c; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="margin:0; font-size: 1.4rem; font-weight: 900;">LA BOMBONERA</h1>
        <div class="label">Alberto J. Armando - Tribunas Unidas</div>
    </div>

    <script>
        let scene, camera, renderer, controls;

        const COLOR_AZUL = 0x003399;
        const COLOR_ORO = 0xffc72c;
        const COLOR_GRIS_PALCO = 0xdddddd;
        const COLOR_COL_PALCO = 0x888888;
        const COLOR_VENTANA_SOLIDO = 0x111111;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 600, 3000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(450, 350, 450); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xfff5e1, 1.3);
            sun.position.set(400, 800, 300);
            sun.castShadow = true;
            sun.shadow.camera.left = -600;
            sun.shadow.camera.right = 600;
            sun.shadow.camera.top = 600;
            sun.shadow.camera.bottom = -600;
            sun.shadow.mapSize.width = 4096;
            sun.shadow.mapSize.height = 4096;
            scene.add(sun);

            createStadium();
            createEnvironment();
            animate();
        }

        function createStadium() {
            const stadium = new THREE.Group();
            const fW = 80; 
            const fL = 115; 

            // --- CAMPO DE JUEGO ---
            const pitchGroup = new THREE.Group();
            const numStrips = 12;
            const stripL = fL / numStrips;
            for(let i = 0; i < numStrips; i++) {
                const isDark = i % 2 === 0;
                const stripGeo = new THREE.PlaneGeometry(fW, stripL);
                const stripMat = new THREE.MeshStandardMaterial({ 
                    color: isDark ? 0x24541f : 0x2d6326, 
                    roughness: 0.8 
                });
                const strip = new THREE.Mesh(stripGeo, stripMat);
                strip.rotation.x = -Math.PI / 2;
                strip.position.z = (i * stripL) - (fL/2) + (stripL/2);
                strip.receiveShadow = true;
                pitchGroup.add(strip);
            }

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lineWidth = 0.4;
            const createLine = (w, h, x, z) => {
                const l = new THREE.Mesh(new THREE.PlaneGeometry(w, h), lineMat);
                l.rotation.x = -Math.PI/2;
                l.position.set(x, 0.05, z);
                pitchGroup.add(l);
            };

            createLine(fW, lineWidth, 0, fL/2);
            createLine(fW, lineWidth, 0, -fL/2);
            createLine(lineWidth, fL, fW/2, 0);
            createLine(lineWidth, fL, -fW/2, 0);
            createLine(fW, lineWidth, 0, 0);

            const centerCircle = new THREE.Mesh(new THREE.RingGeometry(9.15, 9.15 + lineWidth, 64), lineMat);
            centerCircle.rotation.x = -Math.PI/2;
            centerCircle.position.y = 0.06;
            pitchGroup.add(centerCircle);

            stadium.add(pitchGroup);

            // --- TRIBUNAS UNIFICADAS ---
            function addTier(innerOffset, outerOffset, height, yBase, mainColor) {
                const shape = new THREE.Shape();
                const zIn = fL/2 + innerOffset;
                const zOut = fL/2 + outerOffset;
                const xFlat = -fW/2 - 5;

                shape.moveTo(xFlat - (outerOffset - innerOffset), -zOut);
                shape.lineTo(0, -zOut);
                shape.absarc(0, 0, zOut, -Math.PI/2, Math.PI/2, false);
                shape.lineTo(xFlat - (outerOffset - innerOffset), zOut);
                shape.lineTo(xFlat - (outerOffset - innerOffset), -zOut);

                const hole = new THREE.Path();
                hole.moveTo(xFlat, -zIn);
                hole.lineTo(0, -zIn);
                hole.absarc(0, 0, zIn, -Math.PI/2, Math.PI/2, false);
                hole.lineTo(xFlat, zIn);
                hole.lineTo(xFlat, -zIn);
                shape.holes.push(hole);

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: true, bevelThickness: 0.1 });
                const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: mainColor, roughness: 0.8 }));
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.y = yBase;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                stadium.add(mesh);
            }

            // Alturas exactas para que estén pegadas
            const h1 = 25; // Altura bandeja 1
            const h2 = 25; // Altura bandeja 2
            const h3 = 30; // Altura bandeja 3

            // Bandeja 1: Azul (Base 0)
            addTier(5, 25, h1, 0, COLOR_AZUL);   
            // Bandeja 2: Amarilla (Base h1, pegada a la 1)
            addTier(25, 45, h2, h1, COLOR_ORO); 
            // Bandeja 3: Azul (Base h1 + h2, pegada a la 2)
            addTier(45, 75, h3, h1 + h2, COLOR_AZUL);

            const totalH = h1 + h2 + h3;

            // --- ESTRUCTURA EXTERIOR ---
            const wallRadius = 80;
            const xPalcos = -fW/2 - 5;
            
            const createExteriorLayer = (radius, yPos, height, color) => {
                const shape = new THREE.Shape();
                shape.moveTo(xPalcos - 2, -fL/2 - radius);
                shape.lineTo(0, -fL/2 - radius);
                shape.absarc(0, 0, radius + fL/2, -Math.PI/2, Math.PI/2, false);
                shape.lineTo(xPalcos - 2, fL/2 + radius);
                shape.lineTo(xPalcos - 2, -fL/2 - radius);

                const hole = new THREE.Path();
                hole.moveTo(xPalcos + 0.5, -fL/2 - radius + 3);
                hole.lineTo(0, -fL/2 - radius + 3);
                hole.absarc(0, 0, radius + fL/2 - 3, -Math.PI/2, Math.PI/2, false);
                hole.lineTo(xPalcos + 0.5, fL/2 + radius - 3);
                hole.lineTo(xPalcos + 0.5, -fL/2 - radius + 3);
                shape.holes.push(hole);

                const wallGeo = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
                const wallMesh = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({ color: color }));
                wallMesh.rotation.x = -Math.PI/2;
                wallMesh.position.y = yPos;
                wallMesh.castShadow = true;
                wallMesh.receiveShadow = true;
                stadium.add(wallMesh);
            };

            createExteriorLayer(wallRadius, 0, totalH * 0.4, COLOR_AZUL);
            createExteriorLayer(wallRadius, totalH * 0.4, totalH * 0.2, COLOR_ORO);
            createExteriorLayer(wallRadius, totalH * 0.6, totalH * 0.4, COLOR_AZUL);

            const numCols = 16;
            const colRadius = wallRadius + fL/2 + 3;
            for(let i = 0; i <= numCols; i++) {
                const angle = -Math.PI/2 + (Math.PI * i / numCols);
                const x = Math.cos(angle) * colRadius;
                const z = Math.sin(angle) * colRadius;
                if (x > xPalcos - 5) {
                    const isYellow = (i % 4 === 0);
                    const colGeo = new THREE.BoxGeometry(6, totalH + 5, 6);
                    const colMat = new THREE.MeshStandardMaterial({ color: isYellow ? COLOR_ORO : COLOR_AZUL });
                    const col = new THREE.Mesh(colGeo, colMat);
                    col.position.set(x, (totalH + 5)/2, z);
                    col.castShadow = true;
                    stadium.add(col);
                }
            }

            // --- SECTOR PALCOS VIP ---
            const boxWidth = 34; 
            const boxWallHeight = totalH + 5;
            const offsetHaciaCancha = 4; 
            
            const boxesBase = new THREE.Mesh(
                new THREE.BoxGeometry(boxWidth, boxWallHeight, fL + 40),
                new THREE.MeshStandardMaterial({ color: COLOR_GRIS_PALCO })
            );
            boxesBase.position.set(xPalcos - (boxWidth/2) + offsetHaciaCancha, boxWallHeight/2, 0);
            boxesBase.castShadow = true;
            boxesBase.receiveShadow = true;
            stadium.add(boxesBase);

            for(let i = -3; i <= 3; i++) {
                const bCol = new THREE.Mesh(
                    new THREE.BoxGeometry(4, boxWallHeight, 4), 
                    new THREE.MeshStandardMaterial({ color: COLOR_COL_PALCO })
                );
                bCol.position.set(xPalcos - boxWidth + 2 + offsetHaciaCancha, boxWallHeight/2, i * 28);
                stadium.add(bCol);
            }

            const solidGlassMat = new THREE.MeshBasicMaterial({ color: COLOR_VENTANA_SOLIDO });
            for(let level=0; level<4; level++) {
                const row = new THREE.Mesh(new THREE.BoxGeometry(4.1, 8, fL + 25), solidGlassMat);
                row.position.set(xPalcos - 2 + offsetHaciaCancha, 18 + (level * 16), 0);
                stadium.add(row);
            }

            const createTower = (x, z) => {
                const tower = new THREE.Group();
                const h = boxWallHeight + 50;
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2.5, h), new THREE.MeshStandardMaterial({color: 0x555555}));
                pole.position.y = h/2;
                tower.add(pole);
                const head = new THREE.Mesh(new THREE.BoxGeometry(16, 10, 4), new THREE.MeshStandardMaterial({color: 0x333333}));
                head.position.y = h;
                tower.add(head);
                tower.position.set(x, 0, z);
                tower.lookAt(0, 0, 0);
                stadium.add(tower);
            };
            createTower(135, 125); createTower(135, -125);
            createTower(55, 195); createTower(55, -195);

            scene.add(stadium);
        }

        function createEnvironment() {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(6000, 6000),
                new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 1 })
            );
            ground.rotation.x = -Math.PI/2;
            ground.position.y = -1;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
