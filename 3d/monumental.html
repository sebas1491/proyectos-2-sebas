<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadio Mâs Monumental - Estructura Reforzada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #a0d8ef; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #222;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 12px;
            border-left: 8px solid #e30613;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #333; z-index: 1000;
        }
        .spinner {
            width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid #e30613;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: bold; letter-spacing: 1px;">AJUSTANDO COLOR DEL SUELO...</p>
    </div>
    
    <div id="overlay">
        <h1 style="margin:0; font-size: 1.8rem; font-weight: 900;">MONUMENTAL</h1>
    </div>

    <script>
        let scene, camera, renderer, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0d8ef);
            scene.fog = new THREE.Fog(0xa0d8ef, 500, 2000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(300, 200, 350);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(200, 500, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 4096;
            sun.shadow.mapSize.height = 4096;
            scene.add(sun);

            createSky();
            createStadium();
            
            document.getElementById('loader').style.display = 'none';
            animate();
        }

        function createSky() {
            const cloudGeo = new THREE.SphereGeometry(15, 8, 8);
            const cloudMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5});
            for(let i=0; i<20; i++) {
                const cloud = new THREE.Group();
                for(let j=0; j<3; j++) {
                    const p = new THREE.Mesh(cloudGeo, cloudMat);
                    p.position.set(j*10, Math.random()*5, Math.random()*5);
                    cloud.add(p);
                }
                cloud.position.set((Math.random()-0.5)*1800, 400, (Math.random()-0.5)*1800);
                scene.add(cloud);
            }
        }

        function createStadium() {
            const stadium = new THREE.Group();

            // 1. CAMPO DE JUEGO CON DETALLES
            const pitchGroup = new THREE.Group();
            const grassCanvas = document.createElement('canvas');
            grassCanvas.width = 1024; grassCanvas.height = 1024;
            const gCtx = grassCanvas.getContext('2d');
            
            gCtx.fillStyle = '#1b5e20';
            gCtx.fillRect(0, 0, 1024, 1024);

            const stripes = 14;
            for(let i=0; i<stripes; i++) {
                const x = i * (1024/stripes);
                gCtx.fillStyle = i % 2 === 0 ? '#236b28' : '#1b5e20';
                gCtx.fillRect(x, 0, 1024/stripes, 1024);
            }

            const grassTex = new THREE.CanvasTexture(grassCanvas);
            const grassMat = new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.9 });
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(105, 70), grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.receiveShadow = true;
            pitchGroup.add(grass);

            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
            const drawL = (w, h, x, z, r = 0) => {
                const l = new THREE.Mesh(new THREE.PlaneGeometry(w, h), lineMat);
                l.rotation.x = -Math.PI/2; l.rotation.z = r;
                l.position.set(x, 0.05, z); pitchGroup.add(l);
            };

            drawL(0.4, 70, 0, 0); 
            drawL(105.4, 0.4, 0, 35); 
            drawL(105.4, 0.4, 0, -35); 
            drawL(0.4, 70.4, 52.5, 0); 
            drawL(0.4, 70.4, -52.5, 0); 

            const centerCircle = new THREE.Mesh(new THREE.TorusGeometry(9.15, 0.15, 2, 64), lineMat);
            centerCircle.rotation.x = -Math.PI/2; centerCircle.position.y = 0.05;
            pitchGroup.add(centerCircle);

            const drawAreas = (side) => {
                const x = side * 52.5;
                const dir = -side;
                drawL(16.5, 0.3, x + (dir*8.25), 20.15);
                drawL(16.5, 0.3, x + (dir*8.25), -20.15);
                drawL(0.3, 40.3, x + (dir*16.5), 0);
                drawL(5.5, 0.3, x + (dir*2.75), 9.15);
                drawL(5.5, 0.3, x + (dir*2.75), -9.15);
                drawL(0.3, 18.3, x + (dir*5.5), 0);
            };
            drawAreas(1); drawAreas(-1);
            stadium.add(pitchGroup);

            // 2. TRIBUNAS
            function createRing(rx, rz, width, height, yPos, color) {
                const group = new THREE.Group();
                const sectors = [{ s: 0.05, e: 1.52 }, { s: 1.62, e: 3.09 }, { s: 3.19, e: 4.66 }, { s: 4.76, e: 6.23 }];
                sectors.forEach(angle => {
                    const shape = new THREE.Shape();
                    const innerRX = rx - width;
                    const innerRZ = rz - (width * (rz/rx));
                    for (let i = 0; i <= 64; i++) {
                        const a = angle.s + (i / 64) * (angle.e - angle.s);
                        shape[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * rx, Math.sin(a) * rz);
                    }
                    for (let i = 64; i >= 0; i--) {
                        const a = angle.s + (i / 64) * (angle.e - angle.s);
                        shape.lineTo(Math.cos(a) * innerRX, Math.sin(a) * innerRZ);
                    }
                    const mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, {depth: height, bevelEnabled: true, bevelSize: 0.3}), new THREE.MeshStandardMaterial({color: color}));
                    mesh.rotation.x = -Math.PI / 2;
                    mesh.position.y = yPos;
                    mesh.castShadow = true;
                    group.add(mesh);
                });
                return group;
            }

            stadium.add(createRing(72, 57, 12, 8, 0, 0xffffff));   
            stadium.add(createRing(85, 70, 15, 10, 8, 0xe30613));  
            stadium.add(createRing(110, 90, 25, 15, 18, 0xffffff)); 

            // 3. ESTRUCTURA EXTERIOR
            const wallColor = 0x888888;
            const colMat = new THREE.MeshStandardMaterial({color: wallColor, roughness: 0.7});
            const wallHeight = 36;
            
            const wallShape = new THREE.Shape();
            for (let i = 0; i <= 128; i++) {
                const a = (i / 128) * Math.PI * 2;
                wallShape[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * 114, Math.sin(a) * 94);
            }
            for (let i = 128; i >= 0; i--) {
                const a = (i / 128) * Math.PI * 2;
                wallShape.lineTo(Math.cos(a) * 108, Math.sin(a) * 88);
            }
            const wallMesh = new THREE.Mesh(
                new THREE.ExtrudeGeometry(wallShape, {depth: wallHeight, bevelEnabled: false}),
                colMat
            );
            wallMesh.rotation.x = -Math.PI / 2;
            wallMesh.position.y = 0;
            wallMesh.castShadow = true;
            stadium.add(wallMesh);

            for(let i=0; i<48; i++) {
                const a = (i/48) * Math.PI * 2;
                const col = new THREE.Mesh(new THREE.BoxGeometry(6, wallHeight, 8), colMat);
                col.position.set(Math.cos(a) * 111, wallHeight/2, Math.sin(a) * 91);
                col.lookAt(0, wallHeight/2, 0);
                col.castShadow = true;
                stadium.add(col);
            }

            scene.add(stadium);

            // 4. SUELO EXTERIOR (AJUSTADO A UN GRIS MEDIO)
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(1000, 64),
                new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8 }) // Gris concreto equilibrado
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -0.15;
            floor.receiveShadow = true;
            scene.add(floor);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
