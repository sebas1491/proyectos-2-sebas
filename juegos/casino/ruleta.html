<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Europea - Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --felt-green: #065f46;
            --gold: #f59e0b;
        }

        body {
            background-color: #020617;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        /* CONTENEDOR MAESTRO */
        .casino-app {
            width: 960px; 
            height: 600px;
            background: #0f172a;
            border: 2px solid #1e293b;
            border-radius: 20px;
            display: flex;
            padding: 15px;
            gap: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        /* 1. SECCIÓN RULETA */
        .wheel-section {
            width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
        }

        .wheel-container {
            width: 400px;
            height: 400px;
            position: relative;
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1);
            background: radial-gradient(circle, #5d2e1f 60%, #1a0a05 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #2d1610;
        }

        #wheelCanvas { 
            width: 370px; 
            height: 370px; 
        }

        #ballOrbit {
            position: absolute;
            inset: 0;
            z-index: 60;
            pointer-events: none;
            transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1);
        }

        .ball {
            position: absolute;
            width: 14px; height: 14px;
            background: #ffffff;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -155px);
            box-shadow: 0 0 10px rgba(255,255,255,0.9), inset -2px -2px 4px rgba(0,0,0,0.4);
        }

        /* 2. SECCIÓN TABLERO */
        .board-section {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mat-vertical {
            width: 310px; 
            height: 560px;
            background: var(--felt-green);
            border: 4px solid #042f2e;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: row;
            gap: 3px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        .board-col { display: flex; flex-direction: column; gap: 3px; }
        .col-thin { width: 44px; }
        .col-numbers { flex: 1; }

        .bet-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            position: relative;
            background: rgba(0,0,0,0.25);
            border-radius: 4px;
            transition: background 0.2s;
            text-align: center;
        }
        .bet-cell:hover { background-color: rgba(255,255,255,0.15); }

        .zero { height: 45px; background: #10b981; margin-bottom: 3px; font-size: 1.2rem; }
        
        .grid-3x12 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 3px;
            height: 455px;
        }

        .red { background: #dc2626; }
        .black { background: #111111; }

        .vertical-text {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .cols-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            height: 35px;
            margin-top: 3px;
        }

        .suerte-cell {
            background: rgba(0, 0, 0, 0.4);
            color: #d1d5db;
        }

        /* 3. SECCIÓN CONTROLES */
        .controls-section {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            background: #0b1120;
            border: 1px solid #1e293b;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }

        .chip-container {
            flex: 1;
            background: #0b1120;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 10px 0;
            border: 1px solid #1e293b;
        }

        .chip {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            border: 2px dashed rgba(255,255,255,0.4);
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .chip.active {
            transform: scale(1.2);
            border: 2.5px solid var(--gold);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
        }

        #spinBtn {
            height: 70px;
            background: linear-gradient(to bottom, #f59e0b, #b45309);
            border-bottom: 5px solid #78350f;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.25rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        #spinBtn:disabled { opacity: 0.5; filter: grayscale(1); }

        .chip-marker {
            position: absolute;
            width: 18px; height: 18px;
            background: #fbbf24;
            color: black;
            border-radius: 50%;
            font-size: 9px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid white;
            z-index: 50;
            pointer-events: none;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="casino-app">
        
        <div class="wheel-section">
            <div id="wheel" class="wheel-container">
                <canvas id="wheelCanvas" width="370" height="370"></canvas>
                <div id="ballOrbit">
                    <div class="ball"></div>
                </div>
            </div>
            <div id="history" class="mt-6 flex flex-wrap justify-center gap-1.5 w-full px-4 h-10 overflow-hidden"></div>
        </div>

        <div class="board-section">
            <div class="mat-vertical">
                <div class="board-col col-thin pt-[48px]">
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('1st12')">1ª DOCENA</div>
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('2nd12')">2ª DOCENA</div>
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('3rd12')">3ª DOCENA</div>
                </div>

                <div class="board-col col-thin pt-[48px]">
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('1-18')">1 - 18</div>
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('even')">PAR</div>
                    <div class="bet-cell flex-1 bg-red-600/60 vertical-text font-black" onclick="placeBet('red')">ROJO</div>
                    <div class="bet-cell flex-1 bg-black/80 vertical-text font-black" onclick="placeBet('black')">NEGRO</div>
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('odd')">IMPAR</div>
                    <div class="bet-cell flex-1 vertical-text suerte-cell" onclick="placeBet('19-36')">19 - 36</div>
                </div>

                <div class="board-col col-numbers">
                    <div class="bet-cell zero" onclick="placeBet('num-0')">0</div>
                    <div class="grid-3x12" id="numbersGrid"></div>
                    <div class="cols-row">
                        <div class="bet-cell suerte-cell" onclick="placeBet('col-1')">2:1</div>
                        <div class="bet-cell suerte-cell" onclick="placeBet('col-2')">2:1</div>
                        <div class="bet-cell suerte-cell" onclick="placeBet('col-3')">2:1</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-section">
            <div class="stat-card">
                <span class="text-[10px] text-gray-400 block uppercase font-bold mb-1">Tu Saldo</span>
                <span id="balance" class="text-2xl font-black text-green-400">$1000</span>
            </div>
            <div class="stat-card">
                <span class="text-[10px] text-gray-400 block uppercase font-bold mb-1">Apuesta</span>
                <span id="totalBet" class="text-2xl font-black text-yellow-500">$0</span>
            </div>

            <div class="chip-container">
                <div class="chip bg-white text-black active" data-value="1">1</div>
                <div class="chip bg-red-600 text-white" data-value="5">5</div>
                <div class="chip bg-blue-600 text-white" data-value="10">10</div>
                <div class="chip bg-green-600 text-white" data-value="50">50</div>
                <div class="chip bg-slate-900 text-yellow-500" data-value="100">100</div>
                <button onclick="clearBets()" class="mt-2 text-[10px] text-gray-400 uppercase font-black hover:text-white transition-colors">Limpiar</button>
            </div>

            <button id="spinBtn" onclick="spin()">GIRAR</button>
        </div>
    </div>

    <!-- MODAL RESULTADO -->
    <div id="resModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center">
        <div class="bg-slate-900 p-8 rounded-3xl border-2 border-amber-500 text-center w-[280px] shadow-2xl">
            <div id="resNum" class="text-6xl font-black w-24 h-24 flex items-center justify-center rounded-full mx-auto mb-6 border-4 shadow-inner"></div>
            <p id="resMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-amber-500 text-black font-black rounded-2xl hover:bg-amber-400 transition-colors uppercase tracking-widest">Continuar</button>
        </div>
    </div>

    <script>
        const nums = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const colorMap = {0:'green', 1:'red', 2:'black', 3:'red', 4:'black', 5:'red', 6:'black', 7:'red', 8:'black', 9:'red', 10:'black', 11:'black', 12:'red', 13:'black', 14:'red', 15:'black', 16:'red', 17:'black', 18:'red', 19:'red', 20:'black', 21:'red', 22:'black', 23:'red', 24:'black', 25:'red', 26:'black', 27:'red', 28:'black', 29:'black', 30:'red', 31:'black', 32:'red', 33:'black', 34:'red', 35:'black', 36:'red'};

        let balance = 1000, selectedChip = 1, bets = {}, spinning = false;

        window.onload = () => {
            initWheel();
            initGrid();
            updateDisplay();
        };

        function initWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const slice = (Math.PI * 2) / 37;
            const cx = 185, cy = 185, r = 180;

            ctx.clearRect(0,0,370,370);
            
            // 1. Dibujar platos de números exteriores
            nums.forEach((n, i) => {
                const ang = i * slice - Math.PI/2;
                ctx.beginPath();
                ctx.fillStyle = n === 0 ? '#10b981' : (colorMap[n] === 'red' ? '#dc2626' : '#111');
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, ang, ang + slice);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // DIBUJAR NÚMEROS ACOSTADOS (MIRANDO HACIA AFUERA)
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(ang + slice/2);
                
                // Nos movemos al borde donde iría el número
                ctx.translate(r - 18, 0);
                
                // Rotamos 90 grados para que el número quede "acostado"
                ctx.rotate(Math.PI / 2);
                
                ctx.fillStyle = "white";
                ctx.font = "bold 15px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(n, 0, 0);
                ctx.restore();
            });

            // 2. Plato de madera central
            const woodGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 125);
            woodGrad.addColorStop(0, '#78350f');
            woodGrad.addColorStop(0.8, '#451a03');
            woodGrad.addColorStop(1, '#2d1610');
            
            ctx.beginPath();
            ctx.arc(cx, cy, 125, 0, Math.PI*2);
            ctx.fillStyle = woodGrad;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(cx, cy, 125, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 3. LAS 4 ASPAS DORADAS
            const spokeCount = 4;
            for(let i = 0; i < spokeCount; i++) {
                const ang = (i * (Math.PI * 2 / spokeCount)) - Math.PI/2;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(ang);
                
                const goldGrad = ctx.createLinearGradient(15, 0, 100, 0);
                goldGrad.addColorStop(0, '#fef3c7'); 
                goldGrad.addColorStop(0.5, '#d97706'); 
                goldGrad.addColorStop(1, '#92400e'); 
                
                ctx.beginPath();
                ctx.moveTo(15, -4);
                ctx.lineTo(95, -2);
                ctx.quadraticCurveTo(105, 0, 95, 2);
                ctx.lineTo(15, 4);
                ctx.closePath();
                
                ctx.fillStyle = goldGrad;
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 2;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(95, 0, 5, 0, Math.PI*2);
                const ballGrad = ctx.createRadialGradient(93, -2, 1, 95, 0, 5);
                ballGrad.addColorStop(0, '#fff');
                ballGrad.addColorStop(1, '#b45309');
                ctx.fillStyle = ballGrad;
                ctx.fill();
                
                ctx.restore();
            }

            // 4. TORRETA CENTRAL
            ctx.beginPath();
            ctx.arc(cx, cy, 35, 0, Math.PI*2);
            ctx.fillStyle = '#5d2e1f';
            ctx.fill();
            ctx.strokeStyle = '#2d1610';
            ctx.lineWidth = 2;
            ctx.stroke();

            const towerGrad = ctx.createRadialGradient(cx-10, cy-10, 5, cx, cy, 40);
            towerGrad.addColorStop(0, '#fef3c7');
            towerGrad.addColorStop(0.4, '#fbbf24');
            towerGrad.addColorStop(1, '#b45309');
            
            ctx.beginPath();
            ctx.arc(cx, cy, 28, 0, Math.PI*2);
            ctx.fillStyle = towerGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            const tipGrad = ctx.createRadialGradient(cx-4, cy-4, 2, cx, cy, 12);
            tipGrad.addColorStop(0, '#fff');
            tipGrad.addColorStop(1, '#78350f');
            ctx.beginPath();
            ctx.arc(cx, cy, 12, 0, Math.PI*2);
            ctx.fillStyle = tipGrad;
            ctx.fill();
        }

        function initGrid() {
            const grid = document.getElementById('numbersGrid');
            for(let n = 1; n <= 36; n++) {
                const el = document.createElement('div');
                el.className = `bet-cell ${colorMap[n]}`;
                el.id = `cell-${n}`;
                el.innerText = n;
                el.onclick = () => placeBet(`num-${n}`);
                grid.appendChild(el);
            }
        }

        document.querySelectorAll('.chip').forEach(c => {
            c.onclick = () => {
                document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                selectedChip = parseInt(c.dataset.value);
            }
        });

        function placeBet(type) {
            if(spinning || balance < selectedChip) return;
            balance -= selectedChip;
            bets[type] = (bets[type] || 0) + selectedChip;
            updateDisplay();
            renderBets();
        }

        function clearBets() {
            if(spinning) return;
            balance += Object.values(bets).reduce((a,b) => a+b, 0);
            bets = {};
            updateDisplay();
            renderBets();
        }

        function updateDisplay() {
            document.getElementById('balance').innerText = `$${balance}`;
            const total = Object.values(bets).reduce((a,b) => a+b, 0);
            document.getElementById('totalBet').innerText = `$${total}`;
            document.getElementById('spinBtn').disabled = total === 0 || spinning;
        }

        function renderBets() {
            document.querySelectorAll('.chip-marker').forEach(m => m.remove());
            for(const [id, val] of Object.entries(bets)) {
                let parent;
                if(id.startsWith('num-')) {
                    const n = id.split('-')[1];
                    parent = n === '0' ? document.querySelector('.zero') : document.getElementById(`cell-${n}`);
                } else if(id.startsWith('col-')) {
                    const idx = parseInt(id.split('-')[1]) - 1;
                    parent = document.querySelectorAll('.cols-row .bet-cell')[idx];
                } else {
                    const map = {'1st12':'1ª DOCENA', '2nd12':'2ª DOCENA', '3rd12':'3ª DOCENA', '1-18':'1 - 18', 'even':'PAR', 'red':'ROJO', 'black':'NEGRO', 'odd':'IMPAR', '19-36':'19 - 36'};
                    parent = Array.from(document.querySelectorAll('.bet-cell')).find(x => 
                        x.innerText === map[id]
                    );
                }
                if(parent) {
                    const m = document.createElement('div');
                    m.className = 'chip-marker';
                    m.innerText = val > 99 ? '..' : val;
                    parent.appendChild(m);
                }
            }
        }

        function spin() {
            if(spinning) return;
            spinning = true;
            updateDisplay();

            const winIdx = Math.floor(Math.random() * 37);
            const winNum = nums[winIdx];
            
            const wheelRotation = (360 * 6); 
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${wheelRotation}deg)`;
            
            const totalSlices = 37;
            const sliceDeg = 360 / totalSlices;
            const ballFinalRotation = (360 * 18) - (winIdx * sliceDeg) - wheelRotation;
            
            const orbit = document.getElementById('ballOrbit');
            orbit.style.transform = `rotate(${ballFinalRotation}deg)`;

            setTimeout(() => {
                spinning = false;
                processResult(winNum);
            }, 5000);
        }

        function processResult(n) {
            let winAmt = 0;
            const c = colorMap[n];
            
            for(const [type, amt] of Object.entries(bets)) {
                if(type === `num-${n}`) winAmt += amt * 36;
                else if(type === 'red' && c === 'red') winAmt += amt * 2;
                else if(type === 'black' && c === 'black') winAmt += amt * 2;
                else if(type === 'even' && n !== 0 && n % 2 === 0) winAmt += amt * 2;
                else if(type === 'odd' && n !== 0 && n % 2 !== 0) winAmt += amt * 2;
                else if(type === '1st12' && n >= 1 && n <= 12) winAmt += amt * 3;
                else if(type === '2nd12' && n >= 13 && n <= 24) winAmt += amt * 3;
                else if(type === '3rd12' && n >= 25 && n <= 36) winAmt += amt * 3;
                else if(type === '1-18' && n >= 1 && n <= 18) winAmt += amt * 2;
                else if(type === '19-36' && n >= 19 && n <= 36) winAmt += amt * 2;
                else if(type.startsWith('col-')) {
                    const colIdx = parseInt(type.split('-')[1]);
                    if(n !== 0 && (n-1) % 3 === (colIdx-1)) winAmt += amt * 3;
                }
            }

            balance += winAmt;
            const resNum = document.getElementById('resNum');
            resNum.innerText = n;
            resNum.style.backgroundColor = n === 0 ? '#10b981' : (c === 'red' ? '#dc2626' : '#111');
            resNum.style.borderColor = '#f59e0b';
            resNum.style.color = '#fff';
            
            document.getElementById('resMsg').innerText = winAmt > 0 ? `¡HAS GANADO $${winAmt}!` : "LA BANCA GANA";
            document.getElementById('resModal').classList.remove('hidden');

            const hist = document.getElementById('history');
            const dot = document.createElement('div');
            dot.className = `w-8 h-8 shrink-0 rounded-full flex items-center justify-center text-xs font-black border border-white/20 ${n === 0 ? 'bg-green-600' : (c === 'red' ? 'bg-red-600' : 'bg-black')}`;
            dot.innerText = n;
            hist.prepend(dot);
            if(hist.children.length > 10) hist.removeChild(hist.lastChild);

            bets = {};
            updateDisplay();
            renderBets();
        }

        function closeModal() {
            document.getElementById('resModal').classList.add('hidden');
            const wheel = document.getElementById('wheel');
            const orbit = document.getElementById('ballOrbit');
            wheel.style.transition = 'none';
            orbit.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            orbit.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                wheel.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.2, 1)';
                orbit.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.2, 1)';
            }, 50);
        }
    </script>
</body>
</html>
