<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebas Fortune 777 - Menú de Casino</title>
    <!-- Incluimos Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes estilo Casino -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .title-font {
            font-family: 'Cinzel', serif;
        }

        /* Fondo con desenfoque suave */
        .bg-blur {
            position: fixed;
            top: -2%;
            left: -2%;
            width: 104%;
            height: 104%;
            background-image: url('https://images.trvl-media.com/place/6079643/069ab78e-1b41-4fb4-89fe-5204443c61e7.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(3px); 
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* Diseño de Título Estilo Letrero Neón/Casino */
        .casino-title {
            position: relative;
            display: inline-block;
            padding: 10px 40px;
            border: 4px double #d4af37;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 15px #d4af37, inset 0 0 15px #d4af37;
            border-radius: 4px;
        }

        .gold-text-glow {
            background: linear-gradient(to bottom, #fff7ad 0%, #d4af37 50%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.8));
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.9; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.6)); }
            to { opacity: 1; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9)); }
        }

        /* Contenedor de tarjeta con altura reducida */
        .card-container {
            max-width: 260px;
            margin: 0 auto;
            width: 100%;
        }

        .card-compact {
            aspect-ratio: 16/9; /* Proporción panorámica */
            width: 100%;
        }

        .card-hover:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            transform: translateY(-5px);
            border-color: #d4af37;
        }

        /* Botón Acerca de clásico */
        .btn-about-classic {
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 8px 30px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            background: rgba(212, 175, 55, 0.05);
        }

        .btn-about-classic:hover {
            background: #d4af37;
            color: black;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            letter-spacing: 4px;
        }
    </style>
</head>
<body class="antialiased">

    <div class="bg-blur"></div>
    <div class="bg-overlay"></div>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center py-10 px-4">
        
        <!-- Título Casino -->
        <div class="text-center mb-16">
            <div class="casino-title">
                <h1 class="title-font text-4xl md:text-6xl font-black gold-text-glow uppercase tracking-tighter">
                    Sebas Fortune 777
                </h1>
            </div>
            <p class="text-yellow-500/80 text-xs md:text-sm font-bold tracking-[0.5em] uppercase mt-6 flex items-center justify-center gap-3">
                <span class="w-8 h-[1px] bg-yellow-600/50"></span>
                Selecciona tu juego
                <span class="w-8 h-[1px] bg-yellow-600/50"></span>
            </p>
        </div>

        <!-- Grid de Juegos (Nombres debajo) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12 max-w-6xl w-full">

            <!-- Ruleta -->
            <div class="card-container group">
                <a href="https://sebas1491.github.io/proyectos-2-sebas/juegos/casino/ruleta.html" 
                   class="card-compact block relative bg-black rounded-xl overflow-hidden border-2 border-yellow-700/20 card-hover transition-all duration-500 cursor-pointer mb-3">
                    <img src="https://laopinionaustral.com.ar/media/uploads/2023/11/ruleta1-1.jpg" alt="Ruleta" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                </a>
                <h2 class="title-font text-lg font-bold text-center text-yellow-500 tracking-widest uppercase group-hover:text-white transition-colors">Ruleta</h2>
            </div>

            <!-- Slot Pro -->
            <div class="card-container group">
                <a href="https://sebas1491.github.io/proyectos-2-sebas/juegos/casino/slot-basico.html" 
                   class="card-compact block relative bg-black rounded-xl overflow-hidden border-2 border-yellow-700/20 card-hover transition-all duration-500 cursor-pointer mb-3">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdYclWVp3XgjOZLfgAxvxlD0eIz7yHS3qUJA&s" alt="Slot Avanzado" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                </a>
                <h2 class="title-font text-lg font-bold text-center text-yellow-500 tracking-widest uppercase group-hover:text-white transition-colors">Slot Basico</h2>
            </div>

            <!-- Slot Lite -->
            <div class="card-container group">
                <a href="https://sebas1491.github.io/proyectos-2-sebas/juegos/casino/slot-avanzado.html" 
                   class="card-compact block relative bg-black rounded-xl overflow-hidden border-2 border-yellow-700/20 card-hover transition-all duration-500 cursor-pointer mb-3">
                    <img src="https://t4.ftcdn.net/jpg/09/39/30/53/360_F_939305389_xFYBYQyKUnMgRqDsLorvg16mJdxSwRW8.jpg" alt="Slot Básico" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                </a>
                <h2 class="title-font text-lg font-bold text-center text-yellow-500 tracking-widest uppercase group-hover:text-white transition-colors">Slot Avanzado</h2>
            </div>

            <!-- F1 Derby -->
            <div class="card-container group">
                <a href="https://sebas1491.github.io/proyectos-2-sebas/juegos/casino/gran-derby-sebas.html" 
                   class="card-compact block relative bg-black rounded-xl overflow-hidden border-2 border-yellow-700/20 card-hover transition-all duration-500 cursor-pointer mb-3">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQdogi6uu_2IXQPC8ZMsR_x1P31xv0MNJURtA&s" alt="Fórmula 1" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                </a>
                <h2 class="title-font text-lg font-bold text-center text-yellow-500 tracking-widest uppercase group-hover:text-white transition-colors">Fórmula 1</h2>
            </div>

        </div>
        
        <!-- Pie de página -->
        <footer class="mt-20 pt-10 pb-16 w-full max-w-4xl text-center flex flex-col items-center">
            
            <button id="aboutBtn" class="btn-about-classic mb-12">
                Acerca de...
            </button>

            <div class="border-t border-yellow-700/20 pt-8 w-full">
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold">
                    &copy; 2026 Sebas Fortune 777
                </p>
            </div>
        </footer>
    </main>

    <!-- Modal de Créditos -->
    <div id="aboutModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/90 backdrop-blur-md px-4">
        <div class="bg-black border-2 border-yellow-700/30 rounded-3xl p-8 md:p-12 max-w-lg w-full shadow-[0_0_50px_rgba(212,175,55,0.2)] relative">
            
            <button id="closeIcon" class="absolute top-4 right-6 text-yellow-600 text-3xl font-light hover:text-white transition-colors">&times;</button>

            <h3 class="text-yellow-500 text-center text-2xl uppercase tracking-[0.3em] font-black mb-10 border-b border-yellow-900/50 pb-6 title-font">
                Créditos
            </h3>
            
            <div class="space-y-10 text-sm text-center text-gray-200">
                <div>
                    <p class="text-yellow-600 uppercase text-[10px] font-black tracking-widest mb-2">Autor Principal</p>
                    <p class="text-2xl font-bold text-white tracking-tight">Juan Sebastian Olivera</p>
                </div>
                <div>
                    <p class="text-yellow-600 uppercase text-[10px] font-black tracking-widest mb-2">Canal de Contacto</p>
                    <p class="text-lg text-white font-medium">Juanlg1491@gmail.com</p>
                </div>
                <div>
                    <p class="text-yellow-600 uppercase text-[10px] font-black tracking-widest mb-2">IA utilizada</p>
                    <p class="text-white italic">https://gemini.google.com/app?hl=es</p>
                </div>
            </div>
            
            <div class="mt-14 text-center">
                <button id="closeModalBtn" class="text-yellow-600 hover:text-white uppercase text-[10px] font-black tracking-widest transition-all underline">
                    Cerrar panel
                </button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('aboutModal');
        const aboutBtn = document.getElementById('aboutBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const closeIcon = document.getElementById('closeIcon');

        const openModal = () => {
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };
        const closeModal = () => {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        aboutBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        closeIcon.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
